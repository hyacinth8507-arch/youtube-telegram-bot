# YouTube → Telegram 자동 요약 봇 설정 파일

# YouTube 모니터링 설정
youtube:
  channels:
    - id: "UCOB62fKRT7b73X7tRxMuN2g"
      name: "박종훈의 지식한방"
    - id: "UCxvdCnvGODDyuvnELnLkQWw"
      name: "이효석아카데미"
    - id: "UCJNK93wrXOA6YP4uBZ5I4Rw"
      name: "J UTOPIA"
    - id: "UCpqD9_OJNtF6suPpi6mOQCQ"
      name: "월가아재의 과학적 투자"
    - id: "UCt9m3iBPn0e0z0B_t-Va7sw"
      name: "미키피디아"
    - id: "UChY8VUjXv0aA7RF9hDQ0ISg"
      name: "교양이를 부탁해"
  max_results: 5  # 채널당 최신 영상 조회 개수

# 스케줄러 설정
schedule:
  interval_minutes: 30  # 체크 주기 (분)

# 텔레그램 설정
telegram:
  chat_id: -1003891906781

# 네이버 블로그 모니터링 설정
naver_blog:
  enabled: true
  max_results: 5  # 블로그당 최신 글 조회 개수
  blogs:
    - blog_id: "ranto28"
      name: "메르의 블로그"

# 자막 설정
transcript:
  preferred_languages:
    - "ko"
    - "en"

# 요약 설정
summarizer:
  model: "claude-sonnet-4-20250514"
  max_tokens: 16000  # 전체 스크립트 정리 포함으로 증가

# 로깅 설정
logging:
  level: "INFO"
  file: "logs/bot.log"

# 데이터 저장 경로
data:
  processed_videos: "data/processed_videos.json"
  processed_blogs: "data/processed_blogs.json"
