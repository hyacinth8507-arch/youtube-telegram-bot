name: YouTube Telegram Bot

on:
  # 30분마다 자동 실행 (GitHub Actions cron 최소 단위: 5분)
  schedule:
    - cron: "*/30 * * * *"

  # 수동 실행 지원
  workflow_dispatch:

# 동시 실행 방지 - 이전 실행이 끝나야 다음 실행 시작
concurrency:
  group: youtube-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest

    # processed_videos.json 커밋을 위한 쓰기 권한
    permissions:
      contents: write

    steps:
      # 1. 저장소 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. 의존성 설치
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. data 디렉토리 생성 (최초 실행 시)
      - name: Ensure data directory exists
        run: mkdir -p data logs

      # 5. 봇 실행 (1회 파이프라인만 실행하고 종료)
      - name: Run YouTube bot pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          from main import load_config, setup_logging, run_pipeline
          from dotenv import load_dotenv
          load_dotenv(override=True)
          config = load_config('config.yaml')
          setup_logging(
              log_path=config.get('logging', {}).get('file', 'logs/bot.log'),
              level=config.get('logging', {}).get('level', 'INFO'),
          )
          run_pipeline(config)
          "

      # 6. processed_videos.json 변경 시 자동 커밋 + 푸시
      - name: Commit and push processed_videos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed_videos.json
          if git diff --cached --quiet; then
            echo "No changes to processed_videos.json"
          else
            git commit -m "chore: update processed_videos.json [skip ci]"
            git push
          fi
